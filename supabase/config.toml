project_id = "bakbak"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:1420"
additional_redirect_urls = [
  "http://localhost:1420",
  "http://tauri.localhost",
  "tauri://localhost",
]
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.livekit-token]
enabled = true
verify_jwt = true
import_map = "./functions/livekit-token/deno.json"

[functions.soundboard-manage]
enabled = true
verify_jwt = true
import_map = "./functions/soundboard-manage/deno.json"

[functions.message-media-manage]
enabled = true
verify_jwt = true
import_map = "./functions/message-media-manage/deno.json"

[functions.sticker-manage]
enabled = true
verify_jwt = true
import_map = "./functions/sticker-manage/deno.json"
